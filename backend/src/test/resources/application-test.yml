# 测试环境配置
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/admin_scaffold_test?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      database: 1

# Sa-Token 测试配置
sa-token:
  jwt-secret-key: test-jwt-secret-key-for-unit-testing-at-least-32-chars

# Flyway 配置（测试环境禁用自动配置，由 TestDatabaseInitializer 手动执行）
spring.flyway:
  enabled: true
  locations: classpath:db/migration
  baseline-on-migrate: true
  baseline-version: 0
  validate-on-migrate: false

# 日志级别（测试环境）
logging:
  level:
    root: INFO
    io.github.lystrosaurus.admin: DEBUG
    com.baomidou.mybatisplus: WARN
    org.springframework: WARN
    org.flywaydb: DEBUG
