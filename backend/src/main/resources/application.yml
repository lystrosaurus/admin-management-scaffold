spring:
  config:
    import: optional:file:src/main/resources/.env[.properties]
  profiles:
    active: local
  application:
    name: admin-management-scaffold

# 通用配置
server:
  port: 8080
  servlet:
    context-path: /api

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# Sa-Token 配置
sa-token:
  token-name: Authorization
  token-prefix: Bearer
  timeout: 7200           # token有效期(秒) 2小时
  active-timeout: -1      # 临时有效期(-1表示不限制)
  is-concurrent: true     # 是否允许同一账号并发登录
  is-share: false         # 多次登录创建新Token
  token-style: jwt        # JWT风格
  jwt-secret-key: ${JWT_SECRET}
  is-read-header: true
  is-read-cookie: false
  is-read-body: false

# 日志配置
logging:
  level:
    root: INFO
    io.github.lystrosaurus.admin: DEBUG
    com.baomidou.mybatisplus: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"