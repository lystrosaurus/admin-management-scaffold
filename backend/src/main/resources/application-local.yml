# 本地开发环境配置
spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/admin_scaffold?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}

# Flyway 配置
spring.flyway:
  enabled: true
  locations: classpath:db/migration
  baseline-on-migrate: true
  baseline-version: 0
  validate-on-migrate: true

# 日志级别（本地开发更详细）
logging:
  level:
    root: INFO
    io.github.lystrosaurus.admin: DEBUG
    com.baomidou.mybatisplus: DEBUG
    org.springframework: INFO