# 测试环境配置
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/admin_scaffold_test?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      password: ""
      database: 1
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
      - org.redisson.spring.starter.RedissonAutoConfigurationV2

# Sa-Token 测试配置
sa-token:
  token-name: Authorization
  token-prefix: Bearer
  timeout: 7200           # token有效期(秒) 2小时
  active-timeout: -1      # 临时有效期(-1表示不限制)
  is-concurrent: true     # 是否允许同一账号并发登录
  is-share: false         # 多次登录创建新Token
  token-style: jwt        # JWT风格
  jwt-secret-key: test-jwt-secret-key-at-least-32-chars-long
  is-read-header: true
  is-read-cookie: false
  is-read-body: false

# Flyway 配置（测试环境禁用自动配置，由 TestDatabaseInitializer 手动执行）
spring.flyway:
  enabled: false

# 日志级别（测试环境）
logging:
  level:
    root: INFO
    io.github.lystrosaurus.admin: DEBUG
    com.baomidou.mybatisplus: WARN
    org.springframework: WARN